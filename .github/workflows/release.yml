name: Release

# Auto-release on every push to main, plus manual dispatch as a fallback.
# semantic-release decides whether the new commits warrant a version bump —
# if not (e.g. only docs: / chore: commits since the last release), the
# `version` step is a no-op and nothing publishes.
on:
  push:
    branches: [main]
    # CHANGELOG.md is written *by* this workflow's semantic-release commit;
    # excluding it from the trigger isn't strictly needed (the `if:` guard
    # below already skips that commit) but it keeps the action history tidy.
    paths-ignore:
      - CHANGELOG.md
  workflow_dispatch:

# One release at a time; never cancel in-flight (cancelling a half-tagged
# release is worse than waiting).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip the auto-run triggered by semantic-release's own version-bump
    # commit (the "chore(release): X.Y.Z" commit it pushes back to main).
    # Without this guard, every release would trigger another release.
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry==1.8

      - name: Install dependencies
        run: poetry install --with dev

      - name: Release (tag + changelog + GitHub Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          poetry run semantic-release version
          poetry run semantic-release publish

      - name: Build distribution
        run: poetry build

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
        run: poetry publish
