name: Release

# Auto-release on every push to main, plus manual dispatch as a fallback.
# semantic-release decides whether the new commits warrant a version bump —
# if not (e.g. only docs: / chore: commits since the last release), the
# `version` step is a no-op and nothing publishes.
on:
  push:
    branches: [main]
    # CHANGELOG.md is written *by* this workflow's semantic-release commit;
    # excluding it from the trigger isn't strictly needed (the `if:` guard
    # below already skips that commit) but it keeps the action history tidy.
    paths-ignore:
      - CHANGELOG.md
  workflow_dispatch:

# One release at a time; never cancel in-flight (cancelling a half-tagged
# release is worse than waiting).
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip the auto-run triggered by semantic-release's own version-bump
    # commit (the "chore(release): X.Y.Z" commit it pushes back to main).
    # Without this guard, every release would trigger another release.
    if: |
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Release (tag + changelog + GitHub Release)
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Capture the version before and after semantic-release runs. If the
        # commit log since the last tag has no `feat:`/`fix:`/`perf:`/`refactor:`,
        # semantic-release no-ops and the version stays the same — in which
        # case build + publish below must be skipped, otherwise uv rebuilds
        # the existing version and PyPI 400s on "file already exists".
        run: |
          set -euo pipefail
          OLD_VERSION=$(uv version --short)
          [ -n "$OLD_VERSION" ] || { echo "::error::OLD_VERSION is empty — failed to read project version"; exit 1; }
          uv run semantic-release version
          uv run semantic-release publish
          NEW_VERSION=$(uv version --short)
          [ -n "$NEW_VERSION" ] || { echo "::error::NEW_VERSION is empty — failed to read project version"; exit 1; }
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No version bump warranted — skipping build + publish."
          else
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Released $NEW_VERSION (was $OLD_VERSION)."
          fi

      - name: Build distribution
        if: steps.release.outputs.released == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        # Fail loudly if the secret was rotated/renamed and silently substituted
        # with the empty string — otherwise `uv publish` would attempt the upload
        # with no auth and surface as a confusing PyPI 4xx after the tag is public.
        # `--check-url` makes re-runs idempotent: an already-uploaded file is
        # treated as skipped instead of fatal.
        run: |
          set -euo pipefail
          if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
            echo "::error::PYPI_TOKEN secret is empty or unset"
            exit 1
          fi
          uv publish --check-url https://pypi.org/simple/crease/
