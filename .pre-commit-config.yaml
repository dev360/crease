repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-case-conflict
      - id: check-json
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-yaml
        # `args: [--unsafe]` permits python-tag YAML constructors (used by mkdocs.yml
        # for the emoji extension). Without --unsafe, check-yaml refuses to load
        # `!!python/name:material.extensions.emoji.twemoji` and fails the hook.
        args: [--unsafe]
        exclude: ^test_cases/.*template\.yml$
      - id: end-of-file-fixer
        exclude: CHANGELOG.md
      - id: trailing-whitespace
        exclude: CHANGELOG.md

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
