template_id: flat_with_title_rows
version: 1
description: Flat order table preceded by title/metadata rows.
entities:
- name: order
  cardinality: many
  locate:
    tab: Orders
    orientation: flat
    header_row: 3
    data_starts_row: 4
  fields:
  - name: order_id
    source_column: order_id
    type: string
    pattern: ^ORD-\d{4}$
  - name: order_date
    source_column: order_date
    type: date
  - name: customer_email
    source_column: customer_email
    type: email
  - name: quantity
    source_column: quantity
    type: integer
    minimum: 1
  - name: unit_price
    source_column: unit_price
    type: number
    minimum: 0
